<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="">
        <label for="name">Name*</label>
        <input type="text" name="" id="name" required>
        <br>
        <br>

        <label for="address">Address</label>
        <input type="text" name="" id="address">
        <br>
        <br>

        <label for="zipcode">Zip Code*</label>
        <input type="number" name="" id="zipcode" required minlength="5" maxlength="5" placeholder="enter 5 -digit code">
        <br>
        <br>

        <label for="">Country</label>
        <select name="" id="">
            <option value="">India</option>
            <option value="">Usa</option>
            <option value="">China</option>
        </select>
        <br>
        <br>

        <label for="">Gender*</label>
        <input type="radio" name="gen" id="male" required>
        <label for="male">Male</label>
        <input type="radio" name="gen" id="female" required>
        <label for="female">Female</label>
        <input type="radio" name="gen" id="other">
        <label for="other">Other</label>
        <br>
        <br>

        <label for="">Preferences*</label>
        <input type="checkbox" name="pref" id="red">
        <label for="red">Red</label>
        <input type="checkbox" name="pref" id="green">
        <label for="green">Green</label>
        <input type="checkbox" name="pref" id="blue">
        <label for="blue">Blue</label>
        <br>
        <br>

        <label for="phone">Phone*</label>
        <input type="tel" name="phoneNo" id="phone" required minlength="10" maxlength="10">
        <br>
        <br>

        <label for="email">Email*</label>
        <input type="email" name="emailId" id="email" required>
        <br>
        <br>
        <label for="pass">Password*</label>
        <input type="password" name="password" id="pass" required placeholder="6-8 characters" minlength="6" maxlength="8">
        <br>
        <br>

        <label for="vefPass">Verify Password*</label>
        <input type="password" name="vpass" id="vefPass" required minlength="6" maxlength="8">
        <br>
        <br>

        <label for="birth">Birthday*</label>
        <input type="date" name="" id="birth" required min="1990-01-01" max="2026-01-01">
        <br>
        <br>

        <label for="ap">Appointment*</label>
        <input type="time" name="" id="ap" >
        <br>
        <br>

        <input type="submit" name="" id="" value="submit">
        <input type="reset" name="" id="">
        <br>
    </form>
</body>
</html>
