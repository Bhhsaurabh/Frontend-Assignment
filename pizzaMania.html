<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Mania</title>
</head>
<body>
    <h1><mark><img src="../assest/pizza.png" alt="" height="20px" width="20px">Pizza mania <img src="../assest/pizza.png" alt="" height="20px" width="20px"></mark></h1>
    <fieldset width: 60%; padding: 20px;>
        <legend><h2>🍕 Pizza Order Here 🍕</h2></legend>
    <form action="">
        <label for="first_name">First Name:</label>
        <input type="text" name="" id="first_name" placeholder="First Name">
        <br>
        <br>


        <label for="last_name">Last Name:</label>
        <input type="text" name="" id="last_name" placeholder="Last Name">
        <br>
        <br>

        <label for="email">Email:</label>
        <input type="email" name="" id="email" placeholder="abc@example.com">
        <br>
        <br>

        <label for="contact">Contact:</label>
        <input type="tel" name="" id="contact" placeholder="Ex-918273421" min="10" max="10">
        <br>
        <br>

        <label for="date">Preferred Delivery Date:</label>
        <input type="date" name="" id="" min="2026-04-3" max="2026-04-6">
        <br>
        <br>

        <label for="size">Size</label><br>
        <label for="">Small</label>
        <input type="radio" name="size" id="">
        <label for="">Medium</label>
        <input type="radio" name="size" id="">
        <label for="">Large</label>
        <input type="radio" name="size" id="">
        <br>
        <br>

        <label for=""><mark>Outlet</mark></label>
        <select name="" id="">
            <option value="">Jalandhar</option>
            <option value="">Phagwara</option>
            <option value="">Ludhiana</option>
        </select>
        <br>
        <br>
        <label for="">Menu👇</label>
        <table style="border-spacing: 10px;">
            <tr>
                <td><img src="../assest/pizza (1).png" alt="" height="20px" width="20px"></td>
                <td><input type="checkbox"> Hawaiian - 150.00 ₹ <strike>170.00 ₹</strike></td>
                <td>
                    <select name="" id="">
                        <option value="">Select Qty</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><img src="../assest/pizza (2).png" alt="" height="20px" width="20px"></td>
                <td><input type="checkbox"> Pepperoni - 140.00 ₹ <strike>160.00 ₹</strike></td>
                <td>
                    <select name="" id="">
                        <option value="">Select Qty</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><img src="../assest/pizza (3).png" alt="" height="20px" width="20px"></td>
                <td><input type="checkbox"> Vegetable - 130.00 ₹ <strike>150.00 ₹</strike></td>
                <td>
                    <select name="" id="">
                        <option value="">Select Qty</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </td>
            </tr>
        </table>
        <br>
        <br>
        <label for="">Extra Details👇</label>
        <table style="border-spacing: 10px;">
            <tr>
                <td><img src="../assest/payment.png" alt="" height="20px" width="20px"></td>
                <td>Credit Card:</td>
                <td><input type="text" name="" id="" placeholder="1234-5678-9123-1111"></td>
                <td><button name="verify">verify Card</button></td>
            </tr>
            <tr>
                <td><img src="../assest/map.png" alt="" height="20px" width="20px"></td>
                <td>Pin:</td>
                <td><input type="text" name="" id="" placeholder="421504" minlength="6" maxlength="6"></td>
            </tr>
            <tr>
                <td><img src="../assest/picture.png" alt="" height="20px" width="20px"></td>
                <td><i><mark>Upload photo for discound:</mark></i></td>
                <td><input type="file" name="" id=""></td>
            </tr>
            <tr>
                <td><img src="../assest/sticky-note.png" alt="" height="20px" width="20px"></td>
                <td><i><mark>Additional Note:</mark></i></td>
                <td><textarea name="" id=""></textarea></td>
            </tr>
            <tr>
                <td><img src="../assest/favourites.png" alt="" height="20px" width="20px"></td>
                <td><i><mark>Rating:</mark></i></td>
                <td><input type="range" name="" id="" ></td>
            </tr>
            <tr>
                <td colspan="3"></td>
                <td><button type="submit">Submit Order</button></td>
            </tr>
        </table>
        </fieldset>

    </form>
</body>
</html>
